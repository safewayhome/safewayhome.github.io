name: Deploy team board to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Build
        # base = '/' for a user/org root site (<user>.github.io), else '/<repo-name>/'
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          case "$REPO" in
            *.github.io) BASE="/" ;;
            *) BASE="/$REPO/" ;;
          esac
          echo "Building with base=$BASE"
          BOARD_BASE="$BASE" npm run build
      - name: SPA fallback (404 -> index.html)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
