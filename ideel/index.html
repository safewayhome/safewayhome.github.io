<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- OWASP A05/A03 (Content-Security-Policy): samma strikta policy som tavlan. script-src 'self'
         (bygget har inga inline-script), style-src 'unsafe-inline' krävs av React-inline-stilar + Google
         Fonts, connect-src https tillåter Supabase REST (formuläret), form-action 'self'. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; form-action 'self'" />
    <title>LedMig: Ideell förening: ge röst åt de tysta</title>
    <meta name="description" content="En ideell förening som ger röst åt unga kvinnors dolda otrygghet i vardagen, samlar in berättelser med respekt och visar vägen till den helt kostnadsfria trygghetsappen LedMig." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.4-7 10-7 10z' fill='%23c25a52'/></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Titlar: Fraunces (mjuk, varm display-serif). Sidans text: Shantell Sans (handgjord, lekfull men
         läsbar). Nunito behålls för UI (knappar/fält). Alla tre är OFL/fria för kommersiellt bruk med
         fullt svenskt teckenstöd (åäö). -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..900&family=Nunito:wght@400;600;700;800&family=Shantell+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <!-- Ljus, varm bakgrund redan på body så sidan inte blixtrar innan React + CSS laddats. -->
  <body style="margin:0;background:#fbf4ef">
    <div id="root"></div>
    <script type="module" src="/src/ideel/main.jsx"></script>
  </body>
</html>
