<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- OWASP A05/A03 (Content-Security-Policy): samma strikta policy som tavlan/ideel. script-src 'self'
         (bygget har inga inline-script), style-src 'unsafe-inline' krävs av React-inline-stilar + Google
         Fonts, img-src https tillåter kartans CARTO-kakel, connect-src https tillåter backend-anropet. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; form-action 'self'" />
    <title>LedMig: Uplift-modellering (Umeå)</title>
    <meta name="description" content="Datadriven optimeringsmodul för LedMigs fysiska kampanjer: Causal Forest skattar donationslyftet per stadsdel i Umeå och OR-Tools fördelar broschyrerna mot budgeten för maximal nettovinst." />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.4-7 10-7 10z' fill='%23f2c879'/></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Rubriker + siffror: Sora (ren, geometrisk, premium). UI/brödtext: Nunito (varumärkets font).
         Båda OFL/fria för kommersiellt bruk med fullt svenskt teckenstöd (åäö). -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <!-- Mörk bakgrund redan på body så sidan inte blixtrar innan React + CSS laddats. -->
  <body style="margin:0;background:#0A0E1A">
    <div id="root"></div>
    <script type="module" src="/src/uplift/main.jsx"></script>
  </body>
</html>
